name: Chord-Partition Eigenmodes CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  chord-partition:
    name: Chord-Partition Eigenmodes (103 tests)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy scipy

    - name: Run chord-partition eigenmode tests (103 tests)
      run: pytest test_chord_partition_modes.py -v --tb=short

    - name: Verify SSZ constants
      run: |
        python -c "
import math
phi = (1 + math.sqrt(5)) / 2
xi_max = 1 - math.exp(-phi)
d_min = 1 / (1 + xi_max)
assert abs(phi - 1.6180339887498949) < 1e-10
assert abs(xi_max - 0.80171) < 1e-4
assert abs(d_min - 0.55503) < 1e-4
print(f'phi={phi:.15f}  xi_max={xi_max:.5f}  d_min={d_min:.5f}  OK')
"
